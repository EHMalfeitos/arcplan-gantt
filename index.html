<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#111827">
  <title>Arcplan — Executive Gantt</title>
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand"><span class="brand-mark">A</span><div><strong>Arcplan</strong><small>Executive timeline</small></div></div>
      <div class="top-actions"><button class="ghost-btn" id="openBtn">Open project</button><button class="ghost-btn" id="saveBtn">Save project file</button><button class="ghost-btn" id="exportBtn">Export</button><button class="primary-btn" id="addTaskTop">＋ Add task</button><input type="file" id="importFile" accept="application/json,.json" hidden></div>
    </header>

    <main>
      <section class="hero">
        <div><p class="eyebrow">PROJECT OVERVIEW</p><div class="overview-title-line"><h1 id="overviewTitle">Website launch</h1><button class="icon-btn" id="editProject" aria-label="Rename project">✎</button></div><p class="overview-note"><span class="status-dot"></span><span id="saveStatus">Saved automatically on this device</span></p></div>
        <div class="metrics" id="metrics"></div>
      </section>

      <section class="workspace-card">
        <div class="toolbar">
          <div class="view-tabs"><button class="active" data-view="timeline">Timeline</button><button data-view="board">Board</button><button data-view="list">List</button></div>
          <div class="toolbar-actions">
            <label class="style-picker">Style<select id="styleSelect"><option value="executive">Executive</option><option value="minimal">Minimal</option><option value="ocean">Ocean</option><option value="forest">Forest</option><option value="sunset">Sunset</option><option value="plum">Plum</option></select></label>
            <button class="tool-btn" id="todayBtn">Today</button>
            <div class="segmented" id="zoomControl"><button data-zoom="day">Day</button><button class="active" data-zoom="week">Week</button><button data-zoom="month">Month</button></div>
            <button class="tool-btn" id="collapseBtn" title="Collapse phases">⌃</button>
          </div>
        </div>
        <div class="gantt-shell" id="timelineView">
          <aside class="task-panel">
            <div class="panel-head"><span>Work breakdown</span><button class="mini-add" id="addPhaseBtn">＋ Phase</button></div>
            <div id="taskList" class="task-list"></div>
          </aside>
          <div class="timeline-wrap" id="timelineWrap">
            <div id="timeline" class="timeline"></div>
          </div>
        </div>
        <div class="board-view view-pane" id="boardView"></div>
        <div class="list-view view-pane" id="listView"></div>
      </section>
    </main>
  </div>

  <dialog id="taskDialog">
    <form method="dialog" id="taskForm">
      <div class="dialog-head"><div><p class="eyebrow">TASK DETAILS</p><h2 id="dialogTitle">Add task</h2></div><button type="button" class="close-btn" id="closeDialog">×</button></div>
      <input type="hidden" id="taskId">
      <label>Task name<input id="taskName" required maxlength="60" placeholder="e.g. Design approval"></label>
      <label>Phase<select id="taskPhase"></select></label>
      <label>Predecessor<select id="taskPredecessor"><option value="">No predecessor</option></select></label>
      <p class="relationship-note" id="taskSuccessors">Successors: none</p>
      <div class="form-grid"><label>Start date<input type="date" id="taskStart" required></label><label>End date<input type="date" id="taskEnd" required></label></div>
      <div class="form-grid"><label>Progress<input type="range" id="taskProgress" min="0" max="100" step="5"><output id="progressOutput">0%</output></label><label>Owner<input id="taskOwner" maxlength="3" placeholder="EA"></label></div>
      <label>Bar colour<select id="taskColor"><option value="orange">Executive orange</option><option value="blue">Slate blue</option><option value="green">Success green</option><option value="purple">Plum</option><option value="red">Priority red</option><option value="teal">Teal</option></select></label>
      <div class="dialog-actions"><button type="button" class="danger-link" id="deleteTask">Delete</button><span></span><button type="button" class="ghost-btn" id="cancelDialog">Cancel</button><button value="save" class="primary-btn">Save task</button></div>
    </form>
  </dialog>

  <dialog id="phaseDialog">
    <form method="dialog" id="phaseForm"><div class="dialog-head"><div><p class="eyebrow">ORGANIZE WORK</p><h2 id="phaseDialogTitle">Add a phase</h2></div><button type="button" class="close-btn phase-close">×</button></div><input type="hidden" id="phaseId"><label>Phase name<input id="phaseName" required maxlength="40" placeholder="e.g. Development"></label><div class="dialog-actions"><button type="button" class="danger-link" id="deletePhase">Delete</button><span></span><button type="button" class="ghost-btn phase-close">Cancel</button><button value="save" class="primary-btn" id="phaseSave">Add phase</button></div></form>
  </dialog>

  <dialog id="milestoneDialog">
    <form method="dialog" id="milestoneForm"><div class="dialog-head"><div><p class="eyebrow">KEY EVENT</p><h2 id="milestoneDialogTitle">Add milestone</h2></div><button type="button" class="close-btn milestone-close">×</button></div><input type="hidden" id="milestoneId"><label>Milestone name<input id="milestoneName" required maxlength="60" placeholder="e.g. Executive approval"></label><label>Phase<select id="milestonePhase"></select></label><label>Date<input type="date" id="milestoneDate" required></label><label>Predecessor<select id="milestonePredecessor"><option value="">No predecessor</option></select></label><p class="relationship-note" id="milestoneSuccessors">Successors: none</p><div class="dialog-actions"><button type="button" class="danger-link" id="deleteMilestone">Delete</button><span></span><button type="button" class="ghost-btn milestone-close">Cancel</button><button value="save" class="primary-btn">Save milestone</button></div></form>
  </dialog>

  <dialog id="exportDialog">
    <form method="dialog"><div class="dialog-head"><div><p class="eyebrow">SHARE PROJECT</p><h2>Export or restore</h2></div><button type="button" class="close-btn export-close">×</button></div><div class="export-grid"><button type="button" id="exportSvg"><strong>SVG image</strong><small>Sharp, editable chart graphic</small></button><button type="button" id="exportPng"><strong>PNG image</strong><small>Universal image format</small></button><button type="button" id="exportPdf"><strong>PDF</strong><small>Print-ready project report</small></button><button type="button" id="exportJson"><strong>Project file</strong><small>Backup all editable data</small></button><button type="button" id="importJson"><strong>Open project</strong><small>Restore a saved project file</small></button></div></form>
  </dialog>

  <div class="toast" id="toast"></div>
  <script src="app.js"></script>
</body>
</html>
